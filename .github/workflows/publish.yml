name: Publish ADO Dashboard

on:
  schedule:
    - cron: '0 7 * * *'  # daily at 7 AM UTC (8 AM London / 3 AM ET)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN }}
          TEAMS_FILTER: ${{ secrets.TEAMS_FILTER }}
          SPRINT_COUNT: ${{ vars.SPRINT_COUNT || '15' }}
          START_SPRINT: ${{ vars.START_SPRINT }}
          INCLUDE_BACKLOG: ${{ vars.INCLUDE_BACKLOG || 'true' }}
          TRACK_EFFORT: ${{ vars.TRACK_EFFORT || 'true' }}
          OUTPUT_DIR: ./site
        run: |
          mkdir -p site
          python main.py
          mv site/ado_report_*.html site/index.html

      # Stamp the real tenant ID into staticwebapp.config.json before deploy.
      # The placeholder AZURE_TENANT_ID in the openIdIssuer URL must be replaced
      # with the actual tenant GUID so Azure SWA can resolve the OIDC metadata endpoint.
      - name: Patch staticwebapp.config.json with tenant ID
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: |
          sed -i "s/AZURE_TENANT_ID/${AZURE_TENANT_ID}/g" staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./site
          skip_app_build: true
          config_file_location: .

  notify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Post Teams notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ needs.build-and-deploy.result }}
          PAGES_URL: ${{ vars.AZURE_SWA_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$DEPLOY_STATUS" = "success" ]; then
            COLOR="Good"
            TITLE="ADO Dashboard published"
            TEXT="Dashboard updated successfully. [View dashboard]($PAGES_URL)"
          else
            COLOR="Attention"
            TITLE="ADO Dashboard publish failed"
            TEXT="Workflow finished with status: $DEPLOY_STATUS. [View run]($RUN_URL)"
          fi
          curl -s -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"@context\": \"https://schema.org/extensions\",
              \"themeColor\": \"$COLOR\",
              \"summary\": \"$TITLE\",
              \"sections\": [{
                \"activityTitle\": \"$TITLE\",
                \"activityText\": \"$TEXT\"
              }]
            }"
